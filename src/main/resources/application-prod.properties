# SQLite - absolute path in /opt/splitify and WAL mode for better concurrency
spring.datasource.url=jdbc:sqlite:/opt/splitify/splitify.db?journal_mode=WAL&synchronous=NORMAL

# Spotify OAuth2 - production redirect URI
spring.security.oauth2.client.registration.spotify.redirect-uri=https://splitifyapp.app/login/oauth2/code/spotify

# App sits behind Caddy (HTTPS terminated at proxy); trust X-Forwarded-* so
# Spring generates https:// URLs in OAuth redirects instead of http://
server.forward-headers-strategy=native
